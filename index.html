<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家用電費記帳工具</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-8 px-4">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center relative overflow-hidden">
            <div id="connection-status" class="bg-amber-500 text-white text-xs font-bold py-1 px-4 text-center transition-all">
                ⏳ 正在嘗試連線到 Firebase 雲端資料庫...
            </div>
            <h1 class="text-3xl font-extrabold text-gray-800 mt-4 mb-2">⚡ 家用電費記帳工具</h1>
            <p class="text-gray-500 text-sm">即時雲端同步 · 全家共同記帳與用電管理</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 bg-white p-6 rounded-2xl shadow-sm h-fit">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <span>✍️</span> 新增用電紀錄
                </h2>
                <form id="record-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">日期</label>
                        <input type="date" id="date" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">項目分類</label>
                        <select id="category" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="客廳冷氣">❄️ 客廳冷氣</option>
                            <option value="房間冷氣">🛌 房間冷氣</option>
                            <option value="熱水器">♨️ 熱水器</option>
                            <option value="冰箱與家電">🔌 冰箱與家電</option>
                            <option value="公共用電">💡 公共用電</option>
                            <option value="其他">📝 其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">當期用電度數 (度)</label>
                        <input type="number" id="degrees" placeholder="例如: 150" required min="0" step="any" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">推估金額 (元)</label>
                        <input type="number" id="amount" placeholder="例如: 450" required min="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition-colors cursor-pointer shadow-md">
                        確認送出 🚀
                    </button>
                </form>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gradient-to-br from-blue-500 to-blue-600 p-6 rounded-2xl shadow-sm text-white">
                        <p class="text-blue-100 text-sm font-medium">總累積推估金額</p>
                        <p class="text-3xl font-black mt-1">NT$ <span id="total-amount">0</span></p>
                    </div>
                    <div class="bg-gradient-to-br from-amber-500 to-amber-600 p-6 rounded-2xl shadow-sm text-white">
                        <p class="text-amber-100 text-sm font-medium">總消耗用電度數</p>
                        <p class="text-3xl font-black mt-1"><span id="total-degrees">0</span> 度</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">📊 各項目用電比例</h3>
                    <div class="w-full max-w-[280px] mx-auto">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm">
            <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span>📋</span> 歷史用電明細紀錄
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm font-semibold border-b border-gray-100">
                            <th class="p-3">日期</th>
                            <th class="p-3">分類</th>
                            <th class="p-3">用電度數</th>
                            <th class="p-3">推估金額</th>
                            <th class="p-3 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="record-table-body" class="text-gray-700 text-sm divide-y divide-gray-50">
                        </tbody>
                </table>
                <div id="no-data-msg" class="text-center py-8 text-gray-400">
                    目前雲端資料庫尚未有任何記帳資料，快從左側新增第一筆吧！
                </div>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // 1. 自動帶入您提供的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAkccerCte7jLgXvxw4Nqr03LtLvCgYuzo",
            authDomain: "livewithmoney.firebaseapp.com",
            projectId: "livewithmoney",
            storageBucket: "livewithmoney.firebasestorage.app",
            messagingSenderId: "31184417124",
            appId: "1:31184417124:web:54a601540e8d7dbeeb8a71",
            // 自動根據您的專案 ID 產生 Realtime Database 資料庫預設網址
            databaseURL: "https://livewithmoney-default-rtdb.firebaseio.com/"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 檢查與資料庫的連線狀態
        const connectedRef = database.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            const statusDiv = document.getElementById("connection-status");
            if (snap.val() === true) {
                statusDiv.innerText = "✅ 雲端即時資料庫連線成功！全家同步中";
                statusDiv.className = "bg-emerald-500 text-white text-xs font-bold py-1 px-4 text-center transition-all";
            } else {
                statusDiv.innerText = "❌ 連線中斷或尚未開啟資料庫讀寫權限，請確認 Firebase 設定。";
                statusDiv.className = "bg-rose-500 text-white text-xs font-bold py-1 px-4 text-center transition-all";
            }
        });

        // 綁定 HTML 元素
        const recordForm = document.getElementById('record-form');
        const tableBody = document.getElementById('record-table-body');
        const noDataMsg = document.getElementById('no-data-msg');
        const totalAmountEl = document.getElementById('total-amount');
        const totalDegreesEl = document.getElementById('total-degrees');
        
        // 預設今日日期
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // 圖表物件變數
        let categoryChart = null;

        // 2. 監聽 Firebase 資料庫即時變動 (.on 會自動追蹤任何全家人的新增、刪除)
        database.ref('electricity_records').on('value', (snapshot) => {
            const data = snapshot.val();
            
            // 清空舊表格內容
            tableBody.innerHTML = '';
            
            if (!data) {
                noDataMsg.classList.remove('hidden');
                totalAmountEl.innerText = '0';
                totalDegreesEl.innerText = '0';
                updateChart({});
                return;
            }
            
            noDataMsg.classList.add('hidden');
            
            let totalAmount = 0;
            let totalDegrees = 0;
            let chartDataObj = {};

            // 將 Firebase 回傳的鍵值對物件轉為陣列，並依照日期由新到舊排序
            const sortedRecords = [];
            for (let id in data) {
                sortedRecords.push({ id: id, ...data[id] });
            }
            sortedRecords.sort((a, b) => new Date(b.date) - new Date(a.date));

            // 渲染表格與計算總和
            sortedRecords.forEach(record => {
                totalAmount += Number(record.amount);
                totalDegrees += Number(record.degrees);

                // 累加各分類統計做為圖表數據
                chartDataObj[record.category] = (chartDataObj[record.category] || 0) + Number(record.amount);

                // 產生表格列 HTML
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-3 font-medium text-gray-600">${record.date}</td>
                    <td class="p-3"><span class="px-2 py-1 bg-gray-100 text-gray-800 rounded-md text-xs font-medium">${record.category}</span></td>
                    <td class="p-3 font-semibold text-amber-600">${record.degrees} 度</td>
                    <td class="p-3 font-bold text-blue-600">$${record.amount}</td>
                    <td class="p-3 text-center">
                        <button onclick="deleteRecord('${record.id}')" class="text-rose-500 hover:text-rose-700 font-medium text-xs border border-rose-200 hover:border-rose-400 px-2 py-1 rounded transition-colors cursor-pointer">
                            刪除
                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            // 更新總合看板
            totalAmountEl.innerText = totalAmount.toLocaleString();
            totalDegreesEl.innerText = totalDegrees.toLocaleString();

            // 更新圓餅圖
            updateChart(chartDataObj);
        });

        // 3. 處理表單新增資料到 Firebase 雲端
        recordForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const degrees = document.getElementById('degrees').value;
            const amount = document.getElementById('amount').value;

            // 藉由 push() 產生一組 Firebase 唯一的隨機 ID 並儲存
            database.ref('electricity_records').push({
                date: date,
                category: category,
                degrees: Number(degrees),
                amount: Number(amount)
            }).then(() => {
                // 新增成功後重置表單輸入欄
                document.getElementById('degrees').value = '';
                document.getElementById('amount').value = '';
                document.getElementById('date').value = new Date().toISOString().split('T')[0];
            }).catch((error) => {
                alert("儲存失敗，請檢查資料庫權限設定！錯誤訊息：" + error.message);
            });
        });

        // 4. 處理刪除資料功能
        function deleteRecord(id) {
            if (confirm('確定要刪除這筆用電紀錄嗎？此操作將同步所有家人的手機與電腦。')) {
                database.ref(`electricity_records/${id}`).remove();
            }
        }

        // 5. 即時渲染與更新 Chart.js 圓餅圖
        function updateChart(chartData) {
            const labels = Object.keys(chartData);
            const dataValues = Object.values(chartData);

            if (categoryChart) {
                categoryChart.destroy(); // 先銷毀舊圖表才能重新載入新數據
            }

            if (labels.length === 0) return;

            const ctx = document.getElementById('categoryChart').getContext('2 Cen text');
            const ctxCanvas = document.getElementById('categoryChart');
            
            categoryChart = new Chart(ctxCanvas, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: [
                            '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#6b7280'
                        ],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { boxWidth: 12, font: { size: 11 } }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
